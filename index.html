<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVDLData — Inloggen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #0f2140 0%, var(--bg) 70%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo svg {
      width: 48px;
      height: 48px;
      margin-bottom: .75rem;
    }
    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-logo p {
      font-size: .85rem;
      margin-top: .25rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--ink-dim);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .75rem;
      color: var(--ink-dim);
    }
    .login-footer a { font-size: .75rem; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#2563eb"/>
          <path d="M14 34V14l10 10 10-10v20" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>AVDLData</h1>
        <p>Demo Portaal</p>
      </div>

      <div id="loginError" class="msg msg-error" style="display:none;"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">Gebruikersnaam</label>
          <input type="text" id="username" class="input" placeholder="Voer gebruikersnaam in" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input type="password" id="password" class="input" placeholder="Voer wachtwoord in" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">
          Inloggen
        </button>
      </form>

      <div class="login-footer">
        <p>&copy; 2026 AVDLData.nl — Alle rechten voorbehouden</p>
      </div>
    </div>
  </div>

  <script>
    // --- Auth system (localStorage, migrateerbaar naar Supabase) ---
    const USERS_KEY = 'avdldata_users';
    const SESSION_KEY = 'avdldata_session';

    // Standaard admin account
    function initUsers() {
      if (!localStorage.getItem(USERS_KEY)) {
        const defaultUsers = {
          arjan: {
            password: 'avdldata2026',
            role: 'admin',
            name: 'Arjan',
            created: new Date().toISOString()
          }
        };
        localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
      }
    }

    // Check of al ingelogd
    function checkSession() {
      const session = localStorage.getItem(SESSION_KEY);
      if (session) {
        const data = JSON.parse(session);
        if (data && data.username) {
          window.location.href = 'portal.html';
        }
      }
    }

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      initUsers();

      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');

      const users = JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
      const user = users[username];

      if (!user || user.password !== password) {
        errorEl.textContent = 'Ongeldige gebruikersnaam of wachtwoord.';
        errorEl.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        return;
      }

      // Sla sessie op
      const session = {
        username: username,
        name: user.name || username,
        role: user.role || 'klant',
        loginTime: new Date().toISOString()
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));

      // Redirect naar portal
      window.location.href = 'portal.html';
    });

    // Init
    initUsers();
    checkSession();
  </script>
</body>
</html>
